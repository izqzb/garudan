name: garudan
description: Open source mobile control panel for self-hosted servers.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.4.9

  # SSH & Network
  dartssh2: ^2.8.2
  web_socket_channel: ^2.4.0
  dio: ^5.3.4

  # Terminal
  xterm: ^3.4.0

  # Storage
  flutter_secure_storage: ^8.1.0
  shared_preferences: ^2.2.2

  # Auth
  local_auth: ^2.1.8

  # Navigation
  go_router: ^12.1.3

  # Foreground service
  flutter_foreground_task: ^5.0.3

  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # Utils
  uuid: ^4.3.3
  intl: ^0.18.1
  path_provider: ^2.1.2
  permission_handler: ^11.1.0
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.4
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
