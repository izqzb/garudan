name: garudan
description: Open source mobile control panel for self-hosted servers.
version: 1.1.0+2
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1

  # SSH & Network
  dartssh2: ^2.8.2
  web_socket_channel: ^2.4.0
  dio: ^5.4.3

  # Terminal
  xterm: ^4.0.0

  # Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Auth
  local_auth: ^2.3.0

  # Navigation
  go_router: ^13.2.0

  # Foreground service
  flutter_foreground_task: ^6.1.3

  # Charts
  fl_chart: ^0.68.0

  # File picker
  file_picker: ^8.0.3

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Home widget
  home_widget: ^0.4.1

  # Syntax highlighting
  flutter_highlight: ^0.7.0

  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  wakelock_plus: ^1.2.8
  share_plus: ^10.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
