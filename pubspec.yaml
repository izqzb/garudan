name: garudan
description: Open source mobile control panel for self-hosted servers.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  dartssh2: ^2.8.2
  web_socket_channel: ^2.4.0
  dio: ^5.4.3
  xterm: ^3.4.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  local_auth: ^2.3.0
  go_router: ^13.2.0
  flutter_foreground_task: ^6.1.3
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  uuid: ^4.4.2
  intl: ^0.19.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
