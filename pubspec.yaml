name: garudan
description: Open source mobile control panel for self-hosted servers.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.4.9
  dartssh2: ^2.8.2
  web_socket_channel: ^2.4.0
  dio: ^5.3.4
  xterm: ^3.4.0
  flutter_secure_storage: ^8.1.0
  shared_preferences: ^2.2.2
  local_auth: ^2.1.8
  go_router: ^12.1.3
  flutter_foreground_task: ^5.0.3
  flutter_svg: ^2.0.9
  google_fonts: ^5.1.0
  cupertino_icons: ^1.0.6
  uuid: ^4.2.2
  intl: ^0.18.1
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  package_info_plus: ^4.2.0
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
