name: garudan
description: >
  Garudan — Open source mobile control panel for self-hosted servers.
  Terminal, Docker, Files, Monitoring and more.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # SSH & Networking
  dartssh2: ^2.9.1
  web_socket_channel: ^2.4.0
  dio: ^5.4.3

  # Terminal
  xterm: ^4.1.0

  # Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Biometric / PIN Auth
  local_auth: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Foreground Service (keeps terminal alive in background)
  flutter_foreground_task: ^8.17.0

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
